name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    name: Claude Review
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Revisa este Pull Request para el proyecto EmbarcacionesAltoValor (.NET MAUI / C#).

            Enfócate en:
            1. Correctitud de la lógica de negocio (finanzas, embarcaciones)
            2. Integración con Supabase (autenticación, llamadas HTTP, manejo de errores)
            3. Navegación MAUI correcta (push/pop, limpieza de estado)
            4. Seguridad: nunca se deben incluir credenciales en código
            5. XAML: binding, estilos y accesibilidad

            Si hay cambios de UI, menciona que el autor debería adjuntar capturas de pantalla en la descripción del PR.
            Responde en español.
